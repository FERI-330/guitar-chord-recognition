name: guitar-chord
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # Tudományos alap (conda)
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - seaborn
  - tqdm
  - pillow
  - jupyter
  - ipykernel
  - scipy

  # PyTorch – pip-ről (conda MKL konfliktus elkerülése miatt)
  - pip
  - pip:
    - torch==2.6.0+cu124 --index-url https://download.pytorch.org/whl/cu124
    - torchvision==0.21.0+cu124 --index-url https://download.pytorch.org/whl/cu124
    - torchaudio==2.6.0+cu124 --index-url https://download.pytorch.org/whl/cu124

# Telepítési útmutató:
#   conda env create -f environment.yaml
#   conda activate guitar-chord
#
# Ellenőrzés:
#   python -c "import torch; print(torch.__version__); print(torch.cuda.is_available())"
#
# Megjegyzés: A PyTorch pip-ről települ (nem conda-ból), mert a conda pytorch channel
# libtorch CPU-only verziót telepíthet, ami MKL szimbólum-konfliktust okoz.
# Tesztelt konfiguráció: NVIDIA T500, CUDA 12.4, Python 3.10, Ubuntu/Linux.
